<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator Rincian Cetak</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    :root{
      --bg:#eef2f7; --card:#ffffff; --text:#0f172a; --muted:#475569; --line:#dbe4f1;
      --brand:#1e3a8a; --brand-2:#3b82f6; --ok:#16a34a; --warn:#ca8a04; --err:#dc2626;
      --shadow:0 10px 28px rgba(2,6,23,.10); --radius:14px;
    }
    [data-theme="dark"]{
      --bg:#0b1220; --card:#0f172a; --text:#e5e7eb; --muted:#96a3b8; --line:#1f2a44;
      --brand:#60a5fa; --brand-2:#3b82f6; --shadow:0 10px 28px rgba(0,0,0,.45);
    }
    
    *{box-sizing:border-box}
    body{
      font-family: Segoe UI, Roboto, system-ui, -apple-system, Arial;
      background: radial-gradient(1200px 600px at 10% -10%, rgba(59,130,246,.10), transparent),
                  radial-gradient(1000px 500px at 110% -20%, rgba(30,58,138,.10), transparent),
                  var(--bg);
      color:var(--text); padding:24px; margin:0;
    }
    
    header{
      max-width: 1040px; margin:0 auto 16px; display:flex; align-items:center; justify-content:space-between;
    }
    .title{
      display:flex; align-items:center; gap:.6rem; color:var(--brand);
      font-weight:800; font-size:1.35rem;
    }
    .title i{ font-size:1.2rem }
    .toolbar{ display:flex; gap:.6rem; align-items:center }
    .btn{
      border:none; background:var(--brand); color:#fff; font-weight:700;
      padding:.6rem .9rem; border-radius:12px; cursor:pointer; box-shadow: var(--shadow);
      transition: transform .15s ease, filter .15s ease;
    }
    .btn:hover{ transform: translateY(-1px); filter: brightness(1.05) }
    .btn.ghost{
      background:transparent; color:var(--brand); border:1px solid color-mix(in hsl, var(--brand), #fff 60%);
    }
    .btn.icon{ width:42px; height:42px; display:grid; place-items:center; padding:0; border-radius:12px }

    .wrap{ max-width:1040px; margin:0 auto; display:grid; gap:18px; grid-template-columns: 1fr 360px }
    @media (max-width: 980px){ .wrap{ grid-template-columns: 1fr } }

    .card{
      background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
      box-shadow: var(--shadow); padding:24px;
    }

    .drop{
      display:flex; align-items:center; justify-content: center; flex-direction: column; gap:12px; padding:30px 16px; 
      border:2px dashed var(--brand-2); border-radius:12px; background:color-mix(in hsl, var(--brand-2), transparent 95%); 
      cursor:pointer; transition: border-color .15s ease, background .15s ease; text-align: center;
      margin-bottom: 24px;
    }
    [data-theme="dark"] .drop{ background:rgba(59, 130, 246, 0.05) }
    .drop:hover{ background: color-mix(in hsl, var(--brand-2), transparent 85%) }
    .drop i { font-size: 2.5rem; color: var(--brand); }
    .drop strong{ display:block; margin-bottom:4px; font-size: 1.1rem; }
    input[type=file]{ display:none }

    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid var(--line); }
    th { color: var(--muted); font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
    td { font-size: 1.05rem; }
    td.qty { font-weight: 800; font-size: 1.2rem; color: var(--brand); text-align: center; width: 120px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: color-mix(in hsl, var(--bg), transparent 50%); }

    .status{ max-height: 70vh; overflow:auto; padding: 0; display: flex; flex-direction: column; }
    .status-header { padding: 18px; border-bottom: 1px solid var(--line); font-weight: 700; display: flex; align-items: center; gap: 8px;}
    .status ul{ list-style:none; padding:0; margin:0; flex: 1; overflow-y: auto; padding: 10px 18px; }
    .status li{ padding:.6rem .1rem; border-bottom:1px dashed var(--line); font-size:.9rem; display:flex; gap:.8rem; align-items: flex-start; line-height: 1.4;}
    .status li:last-child { border-bottom: none; }
    .status .i{ width:20px; text-align:center; font-weight:800; margin-top: 2px; }
    .ok{ color:var(--ok) } .warn{ color:var(--warn) } .err{ color:var(--err) }
    
    .muted{ color:var(--muted); font-size:.92rem }
    footer{ max-width:1040px; margin:24px auto 0; text-align:center; color:var(--muted); font-size:.9rem }
  </style>
</head>
<body>

  <header>
    <div class="title"><i class="fa-solid fa-calculator"></i> Kalkulator Rincian Cetak</div>
    <div class="toolbar">
      <button id="themeBtn" class="btn icon" title="Toggle tema (Light/Dark)"><i class="fa-solid fa-moon"></i></button>
      <button id="resetBtn" class="btn ghost"><i class="fa-solid fa-rotate-left"></i> Bersihkan</button>
    </div>
  </header>

  <div class="wrap">
    <section class="card">
      <label class="drop" id="dropArea" for="fileInput">
        <i class="fa-solid fa-file-pdf"></i>
        <div>
          <strong>Taruh file PDF pesanan di sini</strong>
          <div class="muted">Atau klik untuk memilih file dari folder</div>
        </div>
      </label>
      <input type="file" id="fileInput" multiple accept=".pdf">

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Nama Bahan / Kertas</th>
              <th style="text-align: center;">Total Lembar</th>
            </tr>
          </thead>
          <tbody id="resultTableBody">
            <tr>
              <td colspan="2" style="text-align: center; color: var(--muted); padding: 30px;">
                Belum ada data. Silakan masukkan file PDF di atas.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <aside class="card status" id="statusBox">
      <div class="status-header">
        <i class="fa-solid fa-list-check"></i> Log Pembacaan File
      </div>
      <ul id="statusList">
        <li style="color: var(--muted); justify-content: center; margin-top: 20px;">Menunggu file...</li>
      </ul>
    </aside>
  </div>

  <footer>© 2026 Spectrum Digital Printing / Kalkulator Cetak</footer>

  <script>
    const themeBtn = document.getElementById('themeBtn');
    themeBtn.addEventListener('click', ()=>{
      const root = document.documentElement;
      const now = root.getAttribute('data-theme') || 'light';
      root.setAttribute('data-theme', now === 'light' ? 'dark' : 'light');
      themeBtn.innerHTML = now === 'light' ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
    });
    
    themeBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';

    const fileInput = document.getElementById('fileInput');
    const dropArea = document.getElementById('dropArea');
    const resultTableBody = document.getElementById('resultTableBody');
    const statusList = document.getElementById('statusList');
    const resetBtn = document.getElementById('resetBtn');

    dropArea.addEventListener('dragover', e => { 
        e.preventDefault(); 
        dropArea.style.borderColor = 'var(--brand)'; 
        dropArea.style.background = 'color-mix(in hsl, var(--brand-2), transparent 85%)';
    });
    dropArea.addEventListener('dragleave', e => { 
        e.preventDefault(); 
        dropArea.style.borderColor = ''; 
        dropArea.style.background = '';
    });
    dropArea.addEventListener('drop', e => {
        e.preventDefault(); 
        dropArea.style.borderColor = ''; 
        dropArea.style.background = '';
        if(e.dataTransfer.files.length) {
            fileInput.files = e.dataTransfer.files;
            processFiles(fileInput.files);
        }
    });

    fileInput.addEventListener('change', (e) => processFiles(e.target.files));

    const kataYangDihapus = ["DIPOTONG", "DI POTONG", "POTONG", "TOLONG"];

    function processFiles(files) {
        if (files.length === 0) return;

        let rekap = {};
        statusList.innerHTML = ""; 

        for (let i = 0; i < files.length; i++) {
            let fileName = files[i].name.toUpperCase().replace('.PDF', '');
            
            // Pre-processing: Amankan nama bahan yang pakai spasi agar tak dikira jumlah
            fileName = fileName.replace(/HVS\s+100/g, 'HVS100');
            fileName = fileName.replace(/AP\s+260/g, 'AP260');
            fileName = fileName.replace(/AP\s+150/g, 'AP150');
            
            let qty = 1;
            let bahanRaw = fileName;

            // UPGRADE LOGIKA: Mencari blok yang terdiri dari Angka + (opsional Huruf Apapun) di dalam file.
            // Contoh yang tertangkap: " 2DD", " 2DG", " 20p", " 1c", " 4", dsb.
            let regex = /(?:^|\s)(\d+)[A-Z]*\b/ig;
            let matches = [...fileName.matchAll(regex)];

            if (matches.length > 0) {
                // Selalu ambil penemuan yang PALING BELAKANG (karena jumlah lembaran sering di akhir)
                let lastMatch = matches[matches.length - 1];
                qty = parseInt(lastMatch[1]);
                // Hapus blok angka tersebut dari teks nama bahan
                bahanRaw = fileName.substring(0, lastMatch.index) + " " + fileName.substring(lastMatch.index + lastMatch[0].length);
            }

            // Bersihkan nama bahan
            let bahan = bahanRaw.replace(/-/g, ' ');

            // Satukan berbagai typo print
            bahan = bahan.replace(/PTINT|PRIT|PRNT|PINT/g, 'PRINT');
            bahan = bahan.replace(/\s+/g, ' ').trim(); 

            // === RULE KHUSUS "PRINT" ===
            if (bahan === "PRINT") {
                bahan = "DECAL";
            } else {
                bahan = bahan.replace(/PRINT 260/g, 'AP260');
                bahan = bahan.replace(/PRINT AP260/g, 'AP260');
                bahan = bahan.replace(/AP260 PRINT/g, 'AP260');
                bahan = bahan.replace(/PRINT/g, ''); // Hapus sisa kata print di bahan lain
            }

            // Hapus kata-kata keterangan "Dipotong/Tolong"
            kataYangDihapus.forEach(kata => {
                bahan = bahan.replace(new RegExp(kata, 'g'), '');
            });

            // Pembersihan ekstra
            bahan = bahan.replace(/\s+[A-Z]$/, ''); // Hapus huruf variasi (A/B/C) yang tertinggal di ujung
            bahan = bahan.replace(/^AA\s+/, ''); 
            bahan = bahan.replace(/\s+/g, ' ').trim(); 

            if (!bahan || bahan === "") bahan = "BAHAN LAINNYA";

            if (!rekap[bahan]) rekap[bahan] = 0;
            rekap[bahan] += qty;

            const li = document.createElement('li');
            li.innerHTML = `<span class="i ok">✓</span><span><i>${files[i].name}</i><br><span class="muted">➔ <b>${bahan}</b> (${qty} lembar)</span></span>`;
            statusList.appendChild(li);
        }

        resultTableBody.innerHTML = "";
        for (const [bahan, totalQty] of Object.entries(rekap)) {
            let row = `<tr>
                <td style="font-weight: 600;">${bahan}</td>
                <td class="qty">${totalQty}</td>
            </tr>`;
            resultTableBody.innerHTML += row;
        }
        
        statusList.scrollTop = statusList.scrollHeight;
    }

    resetBtn.addEventListener('click', () => {
        fileInput.value = '';
        resultTableBody.innerHTML = `<tr><td colspan="2" style="text-align: center; color: var(--muted); padding: 30px;">Belum ada data. Silakan masukkan file PDF di atas.</td></tr>`;
        statusList.innerHTML = `<li style="color: var(--muted); justify-content: center; margin-top: 20px;">Menunggu file...</li>`;
    });
  </script>

</body>
</html>
